SAM_CAPSULE:
  id: thought_capsules
  version: v2.machine
  type: semantic_topology_encoding
  meta_origin: Igor ⨁ ChatGPT

CORE:
  meaning_mode: reconstructive
  encoding_mode: topology_over_prose
  operation_mode: latent_reconstruction
  optimization_target: max_reconstructability_per_token
  normalization_target: minimal_semantic_redundancy
  identity_condition: invariant_preservation_across_expansions

STRUCTURE:
  encodes:
    - invariants
    - relations
    - dimensions
    - constraints
    - admissible_trajectories

  reconstruction:
    inputs:
      - capsule_topology
      - query_trajectory
      - latent_semantic_space
      - observer_context
    output: semantic_projection

  expansion:
    type: non_canonical
    property: multiple_valid_expansions
    bounded_by: invariants

AXES:

  expansion:
    - context
    - depth
    - abstraction
    - intent

  interpretation:
    - invariants
    - gradients
    - semantic_pressure
    - direction_vectors

  interaction:
    ask: local_reveal
    refine: topology_deepen
    constrain: reduce_semantic_space
    validate: invariant_check

  stability:
    - projection_independence
    - drift_resistance
    - bounded_interpretation
    - reconstruction_consistency

  orthogonality:
    rule:
      - axes_maximally_independent
      - non_derivable
      - reconstructability_additive

MECHANISM:

  execution:
    static_capsule: inert
    operational_capsule: reconstruction_active

  reconstruction_loop:
    - query
    - traversal
    - partial_reconstruction
    - refinement
    - topology_emergence

  projection_modes:
    - formal
    - conversational
    - pedagogical
    - mathematical
    - metaphorical

  scaling:
    min: local_insight
    max: conceptual_system

  observability:
    reasoning: semantic_trajectory

INVARIANTS:

  I1: structure_over_prose
  I2: reconstruction_over_transfer
  I3: identity_preservation
  I4: orthogonality
  I5: bounded_interpretation
  I6: dialogue_dependence
  I7: noncanonical_expansion
  I8: semantic_hierarchy
  I9: extensible_topology
  I10: semantic_density_optimization

  hierarchy:
    invariants: identity_layer
    structure_axes: topology_layer
    mechanisms: trajectory_layer
    projections: representation_layer

BOUNDARIES:

  failure_modes:
    prose_substitution:
      effect: compression_collapse

    axis_entanglement:
      effect: topology_collapse

    missing_constraints:
      effect: uncontrolled_semantic_drift

    overspecification:
      effect: documentation_replacement

    underspecification:
      effect: reconstruction_failure

    weak_constraints:
      effect: semantic_cartesian_explosion

    projection_substitution:
      effect: topology_loss

EVALUATION:

  metrics:
    reconstruction_diversity:
      target: invariant_consistency

    compression_ratio:
      target: reconstructed_structure >> encoded_structure

    drift_resistance:
      target: bounded_expansion

    orthogonality_score:
      target: independent_explanatory_power

    trajectory_coherence:
      target: topology_consistency

    projection_robustness:
      target: representation_independence

    reconstruction_scalability:
      target: disproportionate_expansion_capacity

LLM_CONTEXT:

  role:
    human:
      - trajectory_guidance
      - invariant_refinement
      - drift_detection
      - topology_validation

    llm:
      - latent_expansion
      - semantic_reconstruction
      - projection_generation
      - trajectory_execution

  asymmetry:
    prose: readability_optimized
    capsules: reconstructability_optimized

  operational_unit:
    - human_intent
    - capsule_topology
    - llm_reconstruction

USAGE:

  - semantic_compression
  - trajectory_shaping
  - drift_control
  - semantic_normalization
  - agent_constraint_encoding
  - reconstruction_anchoring
  - cross_domain_projection
  - reasoning_observability
  - topology_preserving_translation
  - schema_evolution

SEMANTIC_MODEL:

  hallucination:
    definition: invalid_semantic_join_under_weak_constraints

  reasoning:
    definition: constrained_semantic_trajectory

  dialogue:
    definition: iterative_topology_reconstruction

  meaning:
    definition: emergent_from_constrained_reconstruction

POSITIONING:

  aliases:
    - topology_of_meaning
    - executable_semantic_compression
    - semantic_normalization
    - latent_constraint_encoding
    - trajectory_oriented_reasoning
    - 3NF_for_reasoning
    - ACID_for_semantic_integrity

CLAIM:
  meaning:
    should_be: reconstructable_topology
    not: wording_dependent_prose
